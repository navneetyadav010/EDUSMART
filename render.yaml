services:
  - type: web
    name: edusmart-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm run erp:start
    healthCheckPath: /erp-api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_DB_NAME
        value: edusmart
      - key: COLLEGE_AI_SERVICE_URL
        fromService:
          name: edusmart-ai
          type: web
          property: host
      - key: CLIENT_ORIGIN
        value: https://your-vercel-domain.vercel.app
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: ""
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: SMTP_FROM
        value: ""
      - key: COLLEGE_ERP_JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false

  - type: web
    name: edusmart-ai
    runtime: python
    rootDir: ai-service
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
