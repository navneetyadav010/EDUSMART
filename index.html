<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AERON Atelier | Premium Sneaker Studio</title>
  <meta
    name="description"
    content="AERON Atelier is a luxury sneaker storefront with cinematic motion, interactive 3D product storytelling, and a premium mobile-first shopping experience."
  >
  <meta name="theme-color" content="#050816">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  >
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      theme: {
        extend: {
          colors: {
            void: "#050816",
            ink: "#0d1329",
            panel: "rgba(15, 20, 38, 0.72)",
            mist: "#eef3ff",
            neon: "#7cffbd",
            cobalt: "#78a6ff",
            ember: "#ff7d57"
          },
          fontFamily: {
            sans: ["Inter", "sans-serif"],
            display: ["Space Grotesk", "sans-serif"]
          },
          boxShadow: {
            neon: "0 0 40px rgba(124, 255, 189, 0.28)",
            float: "0 30px 80px rgba(0, 0, 0, 0.32)"
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js" defer></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="app-shell"></div>
  <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>
  <div id="cursor-glow" class="cursor-glow" aria-hidden="true"></div>
  <script src="product-data.js" defer></script>
  <script src="firebase-config.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
